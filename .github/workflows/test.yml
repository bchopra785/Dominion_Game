name: Java Tests
 
on: [push, pull_request]
 
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
 
      - name: Set up Java 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'
          cache: maven
 
      - name: Clear Maven cache to fix bytecode class mismatch
        run: rm -rf ~/.m2/repository/io/github/brandeis-cosi-103a/atg-api/
 
      - run: mvn clean install
      - run: mvn test
